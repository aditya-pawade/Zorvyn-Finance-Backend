spring.application.name=Zorvyn

spring.datasource.url=jdbc:mysql://localhost:3306/zorvyn_db?useSSL=false
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true

server.port=8080

app.security.seed-test-users=true
app.jwt.secret=zorvyn-production-jwt-secret-key-change-in-real-env-2026
app.jwt.expiration-ms=3600000