spring.application.name=Zorvyn

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/zorvyn_db?useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.datasource.driver-class-name=${APP_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=${PORT:8080}

app.security.seed-test-users=${APP_SECURITY_SEED_TEST_USERS:true}
app.jwt.secret=${APP_JWT_SECRET:change-this-dev-secret-before-production}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}