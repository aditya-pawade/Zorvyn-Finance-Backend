spring.datasource.url=jdbc:h2:mem:zorvyn_testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.security.seed-test-users=false
app.jwt.secret=zorvyn-test-jwt-secret-key-change-in-real-env-2026
app.jwt.expiration-ms=600000
